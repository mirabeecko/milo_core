version: "3.9"

services:
  # ───────────────────────────────────────────────
  # PostgreSQL – pouze pro lokální vývoj
  # ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: milo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-milo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-milo_core}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-milo} -d ${POSTGRES_DB:-milo_core}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────────────
  # Redis – cache, sessions, pub/sub, job queue
  # ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: milo-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────────────
  # Ollama – volitelně pro lokální AI modely
  # ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: milo-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    profiles:
      - ai-local

  # ───────────────────────────────────────────────
  # Backend API
  # ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: milo-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - API_PORT=4000
      - API_HOST=0.0.0.0
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ───────────────────────────────────────────────
  # Frontend Next.js
  # ───────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: milo-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  ollama_data: